# configuration file for building snapshots and releases with jitpack.io
jdk:
  - openjdk17
before_install:
  - ./scripts/prepareJitpackEnvironment.sh
install:
  - FILE="-Dfile=app/libs/library.aar"
  - mvn install:install-file $FILE -DgroupId=com.github.evomia -DartifactId=material -Dversion=5.1.1 -Dpackaging=aar -DgeneratePom=true
